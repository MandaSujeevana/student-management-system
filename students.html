<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="vitap-header">
        <img src="assets/vitap-logo.png" alt="VIT-AP Logo" class="logo">
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="students.html">Students</a></li>
            </ul>
        </nav>
    </header>

    <!-- Students Table -->
    <section class="students-section">
        <h2>Registered Students</h2>

        <!-- Search & Sort -->
        <div style="text-align:center; margin-bottom:20px;">
            <input type="text" id="searchInput" placeholder="Search by name or course">
            <button onclick="sortTable('name')">Sort by Name</button>
            <button onclick="sortTable('course')">Sort by Course</button>
        </div>

        <table border="1" id="studentsTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Course</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- JS will populate -->
            </tbody>
        </table>
    </section>

    <!-- Footer -->
    <footer class="vitap-footer">
        <div class="footer-content">
            <div class="footer-left">
                <img src="assets/vitap-logo.png" alt="VIT-AP Logo" class="footer-logo">
            </div>
            <div class="footer-center">
                <p>StudentHubEnroll, Amaravati, Andhra Pradesh</p>
                <p>Email: StudentHubEnroll@gmail.com | Phone: +91 86321 74333</p>
            </div>
            <div class="footer-right">
                <p>© 2026 EduEnroll Student Management System</p>
            </div>
        </div>
    </footer>

    <script src="js/students.js"></script>
</body>
</html>
