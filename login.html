<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="vitap-header">
        <img src="assets/vitap-logo.png" alt="VIT-AP Logo" class="logo">
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="students.html">Students</a></li>
            </ul>
        </nav>
    </header>

    <!-- Login Form -->
    <section class="form-section">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p id="loginMessage"></p>
    </section>

    <!-- Footer -->
    <footer class="vitap-footer">
        <div class="footer-content">
            <div class="footer-left">
                <img src="assets/vitap-logo.png" alt="VIT-AP Logo" class="footer-logo">
            </div>
            <div class="footer-center">
                <p>StudentHubEnroll, Amaravati, Andhra Pradesh</p>
                <p>Email: StudentHubEnroll@gmail.com | Phone: +91 86321 74333</p>
            </div>
            <div class="footer-right">
                <p>© 2026 EduEnroll Student Management System</p>
            </div>
        </div>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
