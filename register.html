<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <meta charset="UTF-8">
    <title>Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header class="vitap-header">
        <img src="assets/vitap-logo.png" alt="VIT-AP Logo" class="logo">
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="students.html">Students</a></li>
            </ul>
        </nav>
    </header>

    <!-- Register Form -->
    <section class="form-section">
        <h2>Register Student</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="phone" placeholder="Phone Number" required>
            <select id="course" required>
                <option value="">Select Programme</option>
                <option value="B.Tech CSE">B.Tech – Computer Science & Engineering</option>
                <option value="B.Tech AI & ML">B.Tech – Artificial Intelligence & Machine Learning</option>
                <option value="B.Tech CSBS">B.Tech – Computer Science & Business Systems</option>
                <option value="B.Tech Cyber Security">B.Tech – Cyber Security</option>
                <option value="B.Tech Data Analytics">B.Tech – Data Analytics</option>
                <option value="B.Tech Software Engg">B.Tech – Software Engineering</option>
                <option value="B.Tech ECE">B.Tech – Electronics & Comm. Engg</option>
                <option value="B.Tech ECE Embedded">B.Tech – ECE (Embedded Systems)</option>
                <option value="B.Tech ECE VLSI">B.Tech – ECE (VLSI)</option>
                <option value="B.Tech Mechanical">B.Tech – Mechanical Engineering</option>
                <option value="BBA">BBA</option>
                <option value="B.Com Finance">B.Com – Finance</option>
                <option value="Integrated M.Tech CSE">Integrated M.Tech CSE</option>
                <option value="Integrated M.Tech SW Engg">Integrated M.Tech Software Engg</option>
                <option value="M.Tech VLSI">M.Tech – VLSI Design</option>
                <option value="M.Sc Data Science">M.Sc – Data Science</option>
                <option value="M.Sc Physics">M.Sc – Physics</option>
                <option value="M.Sc Chemistry">M.Sc – Chemistry</option>
                <option value="MBA">MBA – Master of Business Administration</option>
            </select>
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <p id="message"></p>
    </section>

    <!-- Footer -->
    <footer class="vitap-footer">
        <div class="footer-content">
            <div class="footer-left">
                <img src="assets/vitap-logo.png" alt="VIT-AP Logo" class="footer-logo">
            </div>
            <div class="footer-center">
                <p>StudentHubEnroll, Amaravati, Andhra Pradesh</p>
                <p>Email: StudentHubEnroll@gmail.com | Phone: +91 86321 74333</p>
            </div>
            <div class="footer-right">
                <p>© 2026 EduEnroll Student Management System</p>
            </div>
        </div>
    </footer>

    <script src="js/register.js"></script>
</body>
</html>
